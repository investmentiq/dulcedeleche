<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#08101f" />
  <title>Fun Hour v0.10 — MartianGalactic Labs</title>
  <style>
    :root {
      --bg-1: #07101e;
      --bg-2: #111633;
      --glass: rgba(255,255,255,.085);
      --glass-strong: rgba(255,255,255,.13);
      --line: rgba(255,255,255,.14);
      --text: #f7fbff;
      --muted: #a9b8d1;
      --glow: rgba(111,231,255,.35);
      --shadow: 0 24px 80px rgba(0,0,0,.38);
    }

    * { box-sizing: border-box; }
    html, body { width: 100%; min-height: 100%; margin: 0; }
    body {
      overflow: hidden;
      color: var(--text);
      font-family: Inter, ui-rounded, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at 18% 18%, rgba(69, 102, 255, .23), transparent 29rem),
        radial-gradient(circle at 82% 24%, rgba(177, 80, 255, .18), transparent 27rem),
        radial-gradient(circle at 50% 95%, rgba(52, 225, 187, .14), transparent 34rem),
        linear-gradient(145deg, var(--bg-1), var(--bg-2));
    }

    body.day {
      --bg-1: #badcf7;
      --bg-2: #cdbdf5;
      --glass: rgba(255,255,255,.28);
      --glass-strong: rgba(255,255,255,.42);
      --line: rgba(255,255,255,.55);
      --text: #15233b;
      --muted: #40516c;
      --glow: rgba(255,255,255,.55);
      --shadow: 0 24px 70px rgba(61,74,120,.22);
    }

    .sky {
      position: fixed;
      inset: 0;
      overflow: hidden;
      pointer-events: none;
    }

    .orb {
      position: absolute;
      border-radius: 999px;
      opacity: .75;
      filter: blur(.2px);
      animation: drift linear infinite alternate;
      box-shadow: inset 0 0 25px rgba(255,255,255,.18), 0 0 38px currentColor;
    }

    .orb::after {
      content: "";
      position: absolute;
      inset: 16%;
      border-radius: inherit;
      border: 1px solid rgba(255,255,255,.22);
    }

    @keyframes drift {
      from { transform: translate3d(-18px, 12px, 0) rotate(0deg); }
      to   { transform: translate3d(35px, -42px, 0) rotate(28deg); }
    }

    .star {
      position: absolute;
      width: 3px;
      height: 3px;
      border-radius: 50%;
      background: white;
      opacity: .55;
      animation: twinkle 2.8s ease-in-out infinite alternate;
    }

    @keyframes twinkle {
      from { transform: scale(.75); opacity: .2; }
      to { transform: scale(1.5); opacity: .85; }
    }

    main {
      position: relative;
      z-index: 3;
      width: min(950px, calc(100% - 30px));
      height: 100svh;
      margin: 0 auto;
      display: grid;
      place-items: center;
      padding: 24px 0 82px;
    }

    .panel {
      position: relative;
      width: min(760px, 100%);
      padding: clamp(24px, 5vw, 52px);
      border: 1px solid var(--line);
      border-radius: 36px;
      background: linear-gradient(145deg, var(--glass-strong), var(--glass));
      backdrop-filter: blur(24px) saturate(145%);
      -webkit-backdrop-filter: blur(24px) saturate(145%);
      box-shadow: var(--shadow), inset 0 1px 0 rgba(255,255,255,.18);
      text-align: center;
      overflow: hidden;
    }

    .panel::before {
      content: "";
      position: absolute;
      width: 300px;
      height: 300px;
      border-radius: 50%;
      left: -140px;
      top: -170px;
      background: radial-gradient(circle, rgba(115,236,255,.22), transparent 67%);
      pointer-events: none;
    }

    .lab {
      display: inline-flex;
      align-items: center;
      gap: 9px;
      padding: 8px 13px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(255,255,255,.07);
      font-size: 12px;
      letter-spacing: .15em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .lab-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #79f2c0;
      box-shadow: 0 0 15px #79f2c0;
    }

    .time {
      margin-top: 24px;
      font-size: clamp(58px, 13vw, 122px);
      font-weight: 800;
      line-height: .95;
      letter-spacing: -.065em;
      text-shadow: 0 0 30px var(--glow);
      font-variant-numeric: tabular-nums;
    }

    .ampm {
      display: inline-block;
      margin-left: .15em;
      font-size: .22em;
      letter-spacing: .08em;
      vertical-align: top;
      transform: translateY(.55em);
      color: var(--muted);
    }

    .seconds {
      min-height: 26px;
      margin-top: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 9px;
      color: var(--muted);
      font-size: 14px;
      letter-spacing: .08em;
    }

    .pulse {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #7de8ff;
      box-shadow: 0 0 13px #7de8ff;
      animation: beat 1s ease-in-out infinite;
    }

    @keyframes beat {
      50% { transform: scale(1.8); opacity: .35; }
    }

    .date-card {
      margin: 28px auto 0;
      max-width: 560px;
      padding: 19px 22px;
      border-radius: 24px;
      border: 1px solid var(--line);
      background: rgba(255,255,255,.065);
      display: grid;
      grid-template-columns: auto 1fr;
      align-items: center;
      gap: 18px;
      text-align: left;
    }

    .day-number {
      min-width: 72px;
      height: 72px;
      display: grid;
      place-items: center;
      border-radius: 21px;
      font-weight: 800;
      font-size: 33px;
      background: linear-gradient(145deg, rgba(105,231,255,.3), rgba(177,105,255,.25));
      border: 1px solid rgba(255,255,255,.18);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.25);
    }

    .weekday {
      font-size: clamp(23px, 4vw, 31px);
      font-weight: 750;
      line-height: 1.1;
    }

    .full-date {
      margin-top: 5px;
      color: var(--muted);
      font-size: 14px;
    }

    .message {
      margin: 21px 0 0;
      min-height: 24px;
      color: var(--muted);
      font-size: 15px;
    }

    .controls {
      margin-top: 23px;
      display: flex;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    button, .home {
      appearance: none;
      border: 1px solid var(--line);
      background: rgba(255,255,255,.075);
      color: var(--text);
      border-radius: 999px;
      padding: 11px 16px;
      font: inherit;
      font-size: 13px;
      cursor: pointer;
      text-decoration: none;
      transition: transform .18s ease, background .18s ease;
    }

    button:hover, .home:hover {
      transform: translateY(-2px);
      background: rgba(255,255,255,.14);
    }

    .snail-track {
      position: fixed;
      z-index: 5;
      left: 0;
      right: 0;
      bottom: 10px;
      height: 66px;
      pointer-events: none;
    }

    .snail {
      --walk-time: 34s;
      position: absolute;
      bottom: 0;
      left: -105px;
      width: 88px;
      height: 58px;
      animation: snailWalk var(--walk-time) linear infinite;
      filter: drop-shadow(0 10px 9px rgba(0,0,0,.22));
      transform-origin: center bottom;
    }

    @keyframes snailWalk {
      0% { left: -110px; transform: scaleX(1) translateY(0); }
      48% { left: calc(100% + 12px); transform: scaleX(1) translateY(-2px); }
      50% { left: calc(100% + 12px); transform: scaleX(-1) translateY(0); }
      98% { left: -110px; transform: scaleX(-1) translateY(-2px); }
      100% { left: -110px; transform: scaleX(1) translateY(0); }
    }

    .snail svg {
      width: 100%;
      height: 100%;
      overflow: visible;
    }

    .eye {
      animation: blink 4.6s infinite;
      transform-origin: center;
    }

    @keyframes blink {
      0%, 44%, 48%, 100% { transform: scaleY(1); }
      46% { transform: scaleY(.08); }
    }

    .foot {
      animation: squish .6s ease-in-out infinite alternate;
      transform-origin: center bottom;
    }

    @keyframes squish {
      from { transform: scaleX(.96); }
      to { transform: scaleX(1.05); }
    }

    .trail {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 7px;
      height: 2px;
      opacity: .25;
      background: linear-gradient(90deg, transparent, rgba(168,245,255,.7), transparent);
      filter: blur(1px);
    }

    @media (max-width: 560px) {
      main { padding-bottom: 85px; }
      .panel { border-radius: 28px; padding: 27px 18px 29px; }
      .date-card { grid-template-columns: 64px 1fr; gap: 14px; padding: 15px; }
      .day-number { min-width: 64px; height: 64px; font-size: 29px; }
      .time { letter-spacing: -.075em; }
    }

    @media (prefers-reduced-motion: reduce) {
      .orb, .star, .pulse, .eye, .foot { animation: none !important; }
      .snail { animation-duration: 90s; }
    }
  </style>
</head>
<body>
  <div class="sky" id="sky" aria-hidden="true"></div>

  <main>
    <section class="panel" aria-label="Local time and calendar">
      <div class="lab"><span class="lab-dot"></span> MartianGalactic Labs · Experiment 004</div>

      <div class="time" aria-live="polite">
        <span id="clock">--:--</span><span class="ampm" id="ampm">--</span>
      </div>

      <div class="seconds">
        <span class="pulse"></span>
        <span id="seconds">Local browser time · syncing</span>
      </div>

      <div class="date-card">
        <div class="day-number" id="dayNumber">--</div>
        <div>
          <div class="weekday" id="weekday">Loading today…</div>
          <div class="full-date" id="fullDate">Your local calendar</div>
        </div>
      </div>

      <p class="message" id="message">The snail is checking the time.</p>

      <div class="controls">
        <button type="button" id="formatBtn">Switch to 24-hour</button>
        <button type="button" id="motionBtn">Snail: normal</button>
        <a class="home" href="../../" aria-label="Return to MartianGalactic Labs">⌂ Labs</a>
      </div>
    </section>
  </main>

  <div class="snail-track" aria-hidden="true">
    <div class="trail"></div>
    <div class="snail" id="snail">
      <svg viewBox="0 0 120 80" role="img" aria-label="A cheerful walking snail">
        <defs>
          <radialGradient id="shell" cx="35%" cy="30%">
            <stop offset="0%" stop-color="#ffd77b"/>
            <stop offset="55%" stop-color="#ff9e67"/>
            <stop offset="100%" stop-color="#bb5ad7"/>
          </radialGradient>
          <linearGradient id="body" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#9cf5c7"/>
            <stop offset="100%" stop-color="#41c9ad"/>
          </linearGradient>
        </defs>
        <ellipse class="foot" cx="62" cy="68" rx="50" ry="8" fill="url(#body)"/>
        <path d="M15,61 C18,43 35,39 54,49 C67,55 85,51 98,55 C107,58 112,64 109,68 L22,69 C16,68 12,66 15,61Z" fill="url(#body)"/>
        <circle cx="54" cy="38" r="27" fill="url(#shell)" stroke="rgba(255,255,255,.55)" stroke-width="2"/>
        <path d="M56,22 C72,22 77,42 65,50 C53,58 39,47 43,35 C46,27 57,27 61,34 C64,40 59,45 54,42" fill="none" stroke="rgba(74,38,98,.55)" stroke-width="4" stroke-linecap="round"/>
        <path d="M94,54 C96,39 99,31 104,22" fill="none" stroke="#63d8b4" stroke-width="4" stroke-linecap="round"/>
        <path d="M79,54 C79,39 78,31 75,23" fill="none" stroke="#63d8b4" stroke-width="4" stroke-linecap="round"/>
        <circle cx="105" cy="20" r="6" fill="#dffcf1"/>
        <circle cx="74" cy="21" r="6" fill="#dffcf1"/>
        <g class="eye"><circle cx="106" cy="20" r="2.4" fill="#17243d"/></g>
        <g class="eye"><circle cx="75" cy="21" r="2.4" fill="#17243d"/></g>
        <path d="M88,61 Q94,66 100,61" fill="none" stroke="#176f67" stroke-width="2.5" stroke-linecap="round"/>
        <circle cx="83" cy="57" r="2.5" fill="#ff94a8" opacity=".75"/>
        <circle cx="103" cy="57" r="2.5" fill="#ff94a8" opacity=".75"/>
      </svg>
    </div>
  </div>

  <script>
    (() => {
      const clock = document.getElementById('clock');
      const ampm = document.getElementById('ampm');
      const seconds = document.getElementById('seconds');
      const dayNumber = document.getElementById('dayNumber');
      const weekday = document.getElementById('weekday');
      const fullDate = document.getElementById('fullDate');
      const message = document.getElementById('message');
      const formatBtn = document.getElementById('formatBtn');
      const motionBtn = document.getElementById('motionBtn');
      const snail = document.getElementById('snail');
      const sky = document.getElementById('sky');

      let use24Hour = false;
      let snailMode = 0;

      const messages = [
        'The snail is right on schedule.',
        'A very small calendar department is now operational.',
        'Local time, no server required.',
        'Slow creature. Accurate clock.',
        'Today has successfully loaded.',
        'Time moves fast. The snail respectfully disagrees.'
      ];

      function addSkyObjects() {
        const orbData = [
          [8, 16, 115, '#6ae7ff', 17],
          [76, 12, 82, '#d68cff', 23],
          [84, 70, 125, '#75f0bf', 20],
          [12, 73, 68, '#ffbb75', 15],
          [48, 5, 46, '#8ea4ff', 12],
          [54, 79, 54, '#f68fca', 18]
        ];

        orbData.forEach(([x,y,size,color,duration], i) => {
          const orb = document.createElement('div');
          orb.className = 'orb';
          orb.style.left = x + '%';
          orb.style.top = y + '%';
          orb.style.width = size + 'px';
          orb.style.height = size + 'px';
          orb.style.color = color;
          orb.style.background = `radial-gradient(circle at 32% 28%, rgba(255,255,255,.72), ${color} 22%, transparent 72%)`;
          orb.style.animationDuration = duration + 's';
          orb.style.animationDelay = (-i * 2.4) + 's';
          sky.appendChild(orb);
        });

        for (let i = 0; i < 44; i++) {
          const star = document.createElement('i');
          star.className = 'star';
          star.style.left = Math.random() * 100 + '%';
          star.style.top = Math.random() * 100 + '%';
          star.style.animationDelay = (Math.random() * 4) + 's';
          star.style.animationDuration = (2 + Math.random() * 3) + 's';
          sky.appendChild(star);
        }
      }

      function updateTheme(hour) {
        const daytime = hour >= 7 && hour < 19;
        document.body.classList.toggle('day', daytime);
      }

      function updateClock() {
        const now = new Date();
        const hour = now.getHours();
        const minute = String(now.getMinutes()).padStart(2, '0');
        const second = String(now.getSeconds()).padStart(2, '0');

        updateTheme(hour);

        if (use24Hour) {
          clock.textContent = `${String(hour).padStart(2, '0')}:${minute}`;
          ampm.textContent = '';
        } else {
          const hour12 = hour % 12 || 12;
          clock.textContent = `${hour12}:${minute}`;
          ampm.textContent = hour >= 12 ? 'PM' : 'AM';
        }

        const zone = Intl.DateTimeFormat().resolvedOptions().timeZone || 'local zone';
        seconds.textContent = `${second} seconds · ${zone}`;

        dayNumber.textContent = now.getDate();
        weekday.textContent = new Intl.DateTimeFormat(undefined, { weekday: 'long' }).format(now);
        fullDate.textContent = new Intl.DateTimeFormat(undefined, {
          month: 'long',
          day: 'numeric',
          year: 'numeric'
        }).format(now);

        if (now.getSeconds() === 0 || message.dataset.ready !== 'yes') {
          message.textContent = messages[Math.floor(Math.random() * messages.length)];
          message.dataset.ready = 'yes';
        }
      }

      formatBtn.addEventListener('click', () => {
        use24Hour = !use24Hour;
        formatBtn.textContent = use24Hour ? 'Switch to AM/PM' : 'Switch to 24-hour';
        updateClock();
      });

      motionBtn.addEventListener('click', () => {
        snailMode = (snailMode + 1) % 3;
        const modes = [
          { label: 'Snail: normal', duration: '34s', state: 'running' },
          { label: 'Snail: turbo', duration: '11s', state: 'running' },
          { label: 'Snail: resting', duration: '34s', state: 'paused' }
        ];
        const mode = modes[snailMode];
        snail.style.setProperty('--walk-time', mode.duration);
        snail.style.animationPlayState = mode.state;
        motionBtn.textContent = mode.label;
      });

      addSkyObjects();
      updateClock();
      setInterval(updateClock, 250);
    })();
  </script>
</body>
</html>
