<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#050816" />
  <title>Neon Bounce Room</title>
  <style>
    :root {
      --bg: #050816;
      --cyan: #38f2ff;
      --violet: #9c57ff;
      --pink: #ff4fd8;
      --lime: #9cff57;
      --glass: rgba(10, 16, 40, 0.5);
      --line: rgba(109, 230, 255, 0.32);
    }

    * { box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: var(--bg);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: white;
    }

    body {
      position: relative;
      background:
        radial-gradient(circle at 50% 30%, rgba(72, 60, 180, 0.24), transparent 36%),
        radial-gradient(circle at 18% 15%, rgba(0, 214, 255, 0.10), transparent 30%),
        linear-gradient(180deg, #06091a 0%, #03050d 100%);
    }

    #scene {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
      touch-action: none;
      cursor: crosshair;
    }

    .hud {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 5;
    }

    .topbar {
      position: absolute;
      top: 18px;
      left: 18px;
      right: 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
    }

    .glass {
      background: linear-gradient(180deg, rgba(20, 27, 62, 0.72), rgba(8, 12, 30, 0.52));
      border: 1px solid rgba(124, 221, 255, 0.22);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.08),
        0 12px 35px rgba(0,0,0,0.28),
        0 0 28px rgba(54, 207, 255, 0.06);
      backdrop-filter: blur(14px) saturate(140%);
      -webkit-backdrop-filter: blur(14px) saturate(140%);
    }

    .home {
      width: 48px;
      height: 48px;
      display: grid;
      place-items: center;
      border-radius: 16px;
      color: white;
      text-decoration: none;
      pointer-events: auto;
      transition: transform 180ms ease, border-color 180ms ease, box-shadow 180ms ease;
    }

    .home:hover {
      transform: translateY(-2px) scale(1.04);
      border-color: rgba(92, 233, 255, 0.48);
      box-shadow: 0 0 28px rgba(56, 242, 255, 0.16), 0 12px 30px rgba(0,0,0,0.3);
    }

    .home:active { transform: scale(0.96); }
    .home svg { width: 23px; height: 23px; filter: drop-shadow(0 0 8px rgba(62,235,255,0.65)); }

    .brand {
      min-width: 0;
      padding: 11px 16px 12px;
      border-radius: 17px;
      display: flex;
      flex-direction: column;
      gap: 2px;
      margin-left: auto;
      text-align: right;
    }

    .eyebrow {
      font-size: 10px;
      letter-spacing: 0.32em;
      text-transform: uppercase;
      color: rgba(179, 234, 255, 0.76);
    }

    .title {
      font-weight: 800;
      font-size: clamp(15px, 2vw, 20px);
      letter-spacing: 0.05em;
      text-shadow: 0 0 18px rgba(145, 96, 255, 0.46);
      white-space: nowrap;
    }

    .bottom-panel {
      position: absolute;
      left: 50%;
      bottom: 18px;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px;
      border-radius: 18px;
      pointer-events: auto;
      max-width: calc(100vw - 24px);
    }

    .control {
      appearance: none;
      border: 1px solid rgba(136, 231, 255, 0.18);
      background: rgba(9, 16, 38, 0.58);
      color: rgba(240, 250, 255, 0.94);
      min-height: 42px;
      padding: 0 14px;
      border-radius: 12px;
      font: inherit;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.04em;
      cursor: pointer;
      transition: transform 160ms ease, background 160ms ease, border-color 160ms ease, box-shadow 160ms ease;
    }

    .control:hover {
      transform: translateY(-1px);
      background: rgba(24, 34, 72, 0.74);
      border-color: rgba(100, 225, 255, 0.48);
      box-shadow: 0 0 20px rgba(61, 219, 255, 0.10);
    }

    .control:active { transform: scale(0.97); }
    .control.active {
      background: linear-gradient(135deg, rgba(25, 195, 255, 0.28), rgba(157, 77, 255, 0.30));
      border-color: rgba(118, 236, 255, 0.62);
      box-shadow: inset 0 0 18px rgba(74, 233, 255, 0.09), 0 0 24px rgba(122, 80, 255, 0.11);
    }

    .hint {
      position: absolute;
      left: 50%;
      bottom: 82px;
      transform: translateX(-50%);
      padding: 8px 12px;
      border-radius: 12px;
      font-size: 11px;
      letter-spacing: 0.06em;
      color: rgba(210, 238, 255, 0.72);
      text-align: center;
      white-space: nowrap;
      animation: hintFade 5s ease forwards;
    }

    @keyframes hintFade {
      0%, 55% { opacity: 1; transform: translateX(-50%) translateY(0); }
      100% { opacity: 0; transform: translateX(-50%) translateY(8px); }
    }

    .scanline {
      position: fixed;
      inset: 0;
      z-index: 4;
      pointer-events: none;
      opacity: 0.16;
      background: repeating-linear-gradient(
        to bottom,
        rgba(255,255,255,0.03) 0px,
        rgba(255,255,255,0.03) 1px,
        transparent 1px,
        transparent 4px
      );
      mix-blend-mode: overlay;
    }

    .vignette {
      position: fixed;
      inset: 0;
      z-index: 3;
      pointer-events: none;
      background: radial-gradient(circle at center, transparent 36%, rgba(0,0,10,0.18) 68%, rgba(0,0,8,0.62) 100%);
    }

    @media (max-width: 640px) {
      .topbar { top: 12px; left: 12px; right: 12px; }
      .home { width: 44px; height: 44px; border-radius: 14px; }
      .brand { padding: 9px 12px 10px; border-radius: 14px; }
      .eyebrow { font-size: 8px; letter-spacing: 0.24em; }
      .title { font-size: 14px; }
      .bottom-panel { bottom: 12px; gap: 6px; padding: 6px; }
      .control { min-height: 40px; padding: 0 10px; font-size: 11px; }
      .hint { bottom: 70px; max-width: calc(100vw - 24px); white-space: normal; }
    }

    @media (prefers-reduced-motion: reduce) {
      .hint { animation: none; }
      * { scroll-behavior: auto !important; }
    }
  </style>
</head>
<body>
  <canvas id="scene" aria-label="Interactive futuristic room with a bouncing neon ball"></canvas>

  <div class="vignette"></div>
  <div class="scanline"></div>

  <div class="hud">
    <div class="topbar">
      <a class="home glass" href="../index.html" aria-label="Back to home" title="Back to home">
        <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <path d="M3.5 10.6 12 3.8l8.5 6.8" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M5.7 9.8v9.1h4.2v-5.5h4.2v5.5h4.2V9.8" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </a>

      <div class="brand glass">
        <span class="eyebrow">MartianGalactic Labs</span>
        <span class="title">NEON BOUNCE ROOM</span>
      </div>
    </div>

    <div class="hint glass">Click or tap anywhere to launch the ball</div>

    <div class="bottom-panel glass">
      <button id="pauseBtn" class="control" type="button">Pause</button>
      <button id="trailBtn" class="control active" type="button">Trail: On</button>
      <button id="boostBtn" class="control" type="button">Hyper Boost</button>
      <button id="resetBtn" class="control" type="button">Reset</button>
    </div>
  </div>

  <script>
    (() => {
      'use strict';

      const canvas = document.getElementById('scene');
      const ctx = canvas.getContext('2d', { alpha: false });
      const pauseBtn = document.getElementById('pauseBtn');
      const trailBtn = document.getElementById('trailBtn');
      const boostBtn = document.getElementById('boostBtn');
      const resetBtn = document.getElementById('resetBtn');

      let width = 0;
      let height = 0;
      let dpr = 1;
      let lastTime = performance.now();
      let paused = false;
      let trailsEnabled = true;
      let hyperBoost = false;
      let shake = 0;
      let flash = 0;
      let pointer = { x: 0, y: 0, active: false };

      const stars = [];
      const particles = [];
      const trail = [];

      const ball = {
        x: 0,
        y: 0,
        vx: 360,
        vy: -120,
        radius: 34,
        hue: 185,
        spin: 0,
        squash: 0,
        lastImpact: 0
      };

      const room = {
        floorY: 0,
        ceilingY: 0,
        leftX: 0,
        rightX: 0,
        vanishX: 0,
        vanishY: 0
      };

      function resize() {
        dpr = Math.min(window.devicePixelRatio || 1, 2);
        width = Math.max(320, window.innerWidth);
        height = Math.max(480, window.innerHeight);
        canvas.width = Math.round(width * dpr);
        canvas.height = Math.round(height * dpr);
        canvas.style.width = width + 'px';
        canvas.style.height = height + 'px';
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

        room.vanishX = width * 0.5;
        room.vanishY = height * 0.29;
        room.floorY = height * 0.86;
        room.ceilingY = height * 0.08;
        room.leftX = width * 0.095;
        room.rightX = width * 0.905;

        ball.radius = Math.max(24, Math.min(48, Math.min(width, height) * 0.047));
        if (!ball.x || !ball.y) resetBall(false);

        makeStars();
      }

      function makeStars() {
        stars.length = 0;
        const count = Math.round((width * height) / 11500);
        for (let i = 0; i < count; i++) {
          stars.push({
            x: Math.random() * width,
            y: Math.random() * height * 0.62,
            size: Math.random() * 1.8 + 0.25,
            speed: Math.random() * 0.7 + 0.2,
            phase: Math.random() * Math.PI * 2,
            tint: Math.random() > 0.5 ? 190 : 275
          });
        }
      }

      function resetBall(withBurst = true) {
        ball.x = width * 0.34;
        ball.y = height * 0.32;
        ball.vx = width * 0.28;
        ball.vy = -height * 0.18;
        ball.hue = 185;
        ball.spin = 0;
        ball.squash = 0;
        trail.length = 0;
        if (withBurst) burst(ball.x, ball.y, 30, ball.hue, 1.3);
      }

      function roomBoundsAtY(y) {
        const t = Math.max(0, Math.min(1, (y - room.vanishY) / (room.floorY - room.vanishY)));
        const left = room.vanishX + (room.leftX - room.vanishX) * t;
        const right = room.vanishX + (room.rightX - room.vanishX) * t;
        return { left, right, t };
      }

      function burst(x, y, count, hue, force = 1) {
        const maxParticles = 280;
        for (let i = 0; i < count && particles.length < maxParticles; i++) {
          const a = Math.random() * Math.PI * 2;
          const speed = (70 + Math.random() * 250) * force;
          particles.push({
            x,
            y,
            vx: Math.cos(a) * speed,
            vy: Math.sin(a) * speed,
            life: 0.45 + Math.random() * 0.75,
            maxLife: 0.45 + Math.random() * 0.75,
            size: 1.2 + Math.random() * 4.5,
            hue: (hue + Math.random() * 70 - 35 + 360) % 360,
            drag: 0.975 + Math.random() * 0.015
          });
        }
      }

      function impact(x, y, normalX, normalY, speed) {
        const now = performance.now();
        if (now - ball.lastImpact < 70) return;
        ball.lastImpact = now;
        ball.hue = (ball.hue + 27 + Math.random() * 34) % 360;
        ball.squash = Math.min(0.32, speed / 1800);
        shake = Math.min(12, speed / 100);
        flash = Math.min(1, speed / 1000);
        const count = Math.round(8 + Math.min(28, speed / 45));
        burst(x - normalX * ball.radius * 0.4, y - normalY * ball.radius * 0.4, count, ball.hue, 0.65 + speed / 1500);
      }

      function launchToward(x, y) {
        const dx = x - ball.x;
        const dy = y - ball.y;
        const length = Math.hypot(dx, dy) || 1;
        const base = hyperBoost ? 980 : 690;
        ball.vx = (dx / length) * base;
        ball.vy = (dy / length) * base - 180;
        burst(ball.x, ball.y, hyperBoost ? 32 : 18, ball.hue, hyperBoost ? 1.4 : 0.9);
        shake = hyperBoost ? 8 : 3;
      }

      function update(dt, time) {
        if (paused) return;

        const gravity = hyperBoost ? 1180 : 930;
        const restitution = hyperBoost ? 0.91 : 0.86;
        const air = Math.pow(0.9992, dt * 60);

        ball.vy += gravity * dt;
        ball.vx *= air;
        ball.vy *= Math.pow(0.99965, dt * 60);
        ball.x += ball.vx * dt;
        ball.y += ball.vy * dt;
        ball.spin += (ball.vx / Math.max(1, ball.radius)) * dt * 0.025;
        ball.hue = (ball.hue + dt * (hyperBoost ? 38 : 13)) % 360;
        ball.squash *= Math.pow(0.04, dt);

        const bounds = roomBoundsAtY(Math.max(room.vanishY + 1, ball.y));
        const left = bounds.left + ball.radius;
        const right = bounds.right - ball.radius;
        const floor = room.floorY - ball.radius;
        const ceiling = room.ceilingY + ball.radius;

        if (ball.x < left) {
          const speed = Math.abs(ball.vx);
          ball.x = left;
          ball.vx = Math.abs(ball.vx) * restitution;
          impact(left, ball.y, 1, 0, speed);
        } else if (ball.x > right) {
          const speed = Math.abs(ball.vx);
          ball.x = right;
          ball.vx = -Math.abs(ball.vx) * restitution;
          impact(right, ball.y, -1, 0, speed);
        }

        if (ball.y > floor) {
          const speed = Math.abs(ball.vy);
          ball.y = floor;
          ball.vy = -Math.abs(ball.vy) * restitution;
          ball.vx *= 0.995;
          impact(ball.x, floor, 0, -1, speed);
          if (Math.abs(ball.vy) < 115) ball.vy = -(hyperBoost ? 510 : 390);
        } else if (ball.y < ceiling) {
          const speed = Math.abs(ball.vy);
          ball.y = ceiling;
          ball.vy = Math.abs(ball.vy) * restitution;
          impact(ball.x, ceiling, 0, 1, speed);
        }

        if (trailsEnabled) {
          trail.unshift({ x: ball.x, y: ball.y, hue: ball.hue, life: 1, r: ball.radius });
          const maxTrail = hyperBoost ? 34 : 24;
          if (trail.length > maxTrail) trail.length = maxTrail;
          for (const t of trail) t.life *= Math.pow(0.14, dt);
        } else {
          trail.length = 0;
        }

        for (let i = particles.length - 1; i >= 0; i--) {
          const p = particles[i];
          p.life -= dt;
          p.vy += gravity * 0.32 * dt;
          p.vx *= Math.pow(p.drag, dt * 60);
          p.vy *= Math.pow(p.drag, dt * 60);
          p.x += p.vx * dt;
          p.y += p.vy * dt;
          if (p.life <= 0) particles.splice(i, 1);
        }

        shake *= Math.pow(0.03, dt);
        flash *= Math.pow(0.015, dt);

        for (const s of stars) {
          s.y += s.speed * dt * 6;
          if (s.y > room.vanishY + 30) {
            s.y = Math.random() * 15;
            s.x = Math.random() * width;
          }
        }
      }

      function drawBackground(time) {
        const g = ctx.createLinearGradient(0, 0, 0, height);
        g.addColorStop(0, '#06091b');
        g.addColorStop(0.52, '#050816');
        g.addColorStop(1, '#02040a');
        ctx.fillStyle = g;
        ctx.fillRect(0, 0, width, height);

        const aura = ctx.createRadialGradient(room.vanishX, room.vanishY, 0, room.vanishX, room.vanishY, Math.max(width, height) * 0.62);
        aura.addColorStop(0, 'rgba(87, 65, 214, 0.27)');
        aura.addColorStop(0.34, 'rgba(31, 110, 172, 0.10)');
        aura.addColorStop(1, 'rgba(0, 0, 0, 0)');
        ctx.fillStyle = aura;
        ctx.fillRect(0, 0, width, height);

        for (const s of stars) {
          const twinkle = 0.32 + 0.45 * (0.5 + 0.5 * Math.sin(time * 0.0017 + s.phase));
          ctx.fillStyle = `hsla(${s.tint}, 100%, 78%, ${twinkle})`;
          ctx.beginPath();
          ctx.arc(s.x, s.y, s.size, 0, Math.PI * 2);
          ctx.fill();
        }
      }

      function drawRoom(time) {
        const vx = room.vanishX;
        const vy = room.vanishY;
        const pulse = 0.55 + 0.45 * Math.sin(time * 0.0012);

        // Back portal
        const portalW = Math.min(width * 0.25, 320);
        const portalH = Math.min(height * 0.29, 260);
        const pg = ctx.createRadialGradient(vx, vy, 0, vx, vy, portalW * 0.7);
        pg.addColorStop(0, `rgba(67, 240, 255, ${0.15 + pulse * 0.06})`);
        pg.addColorStop(0.42, 'rgba(139, 70, 255, 0.10)');
        pg.addColorStop(1, 'rgba(0,0,0,0)');
        ctx.fillStyle = pg;
        ctx.fillRect(vx - portalW, vy - portalH, portalW * 2, portalH * 2);

        ctx.save();
        ctx.strokeStyle = `rgba(99, 233, 255, ${0.34 + pulse * 0.14})`;
        ctx.lineWidth = 1.2;
        ctx.shadowColor = 'rgba(54, 224, 255, 0.72)';
        ctx.shadowBlur = 16;
        roundRectPath(ctx, vx - portalW * 0.30, vy - portalH * 0.28, portalW * 0.60, portalH * 0.56, 24);
        ctx.stroke();
        ctx.restore();

        // Room planes
        ctx.fillStyle = 'rgba(15, 21, 50, 0.24)';
        ctx.beginPath();
        ctx.moveTo(room.leftX, room.floorY);
        ctx.lineTo(vx, vy);
        ctx.lineTo(room.rightX, room.floorY);
        ctx.closePath();
        ctx.fill();

        ctx.fillStyle = 'rgba(16, 21, 48, 0.20)';
        ctx.beginPath();
        ctx.moveTo(room.leftX, room.ceilingY);
        ctx.lineTo(vx, vy);
        ctx.lineTo(room.rightX, room.ceilingY);
        ctx.closePath();
        ctx.fill();

        // Floor grid
        ctx.save();
        ctx.lineWidth = 1;
        for (let i = 0; i <= 12; i++) {
          const t = i / 12;
          const sx = vx + (room.leftX - vx) * t;
          const ex = vx + (room.rightX - vx) * t;
          ctx.strokeStyle = `rgba(77, 224, 255, ${0.10 + t * 0.18})`;
          ctx.beginPath();
          ctx.moveTo(sx, vy);
          ctx.lineTo(sx + (sx < vx ? -width * 0.12 : width * 0.12) * t, room.floorY);
          ctx.stroke();

          if (i > 0) {
            ctx.beginPath();
            ctx.moveTo(ex, vy);
            ctx.lineTo(ex + (ex < vx ? -width * 0.12 : width * 0.12) * t, room.floorY);
            ctx.stroke();
          }
        }

        const rows = 17;
        for (let i = 1; i <= rows; i++) {
          const z = i / rows;
          const eased = Math.pow(z, 2.15);
          const y = vy + (room.floorY - vy) * eased;
          const b = roomBoundsAtY(y);
          ctx.strokeStyle = `rgba(98, 110, 255, ${0.07 + z * 0.22})`;
          ctx.beginPath();
          ctx.moveTo(b.left, y);
          ctx.lineTo(b.right, y);
          ctx.stroke();
        }

        // Wall ribs
        for (let i = 0; i < 8; i++) {
          const z = (i + 1) / 8;
          const yTop = vy + (room.ceilingY - vy) * z;
          const yBot = vy + (room.floorY - vy) * z;
          const xL = vx + (room.leftX - vx) * z;
          const xR = vx + (room.rightX - vx) * z;
          const alpha = 0.08 + z * 0.16;
          ctx.strokeStyle = `rgba(168, 81, 255, ${alpha})`;
          ctx.beginPath();
          ctx.moveTo(xL, yTop);
          ctx.lineTo(xL, yBot);
          ctx.stroke();
          ctx.beginPath();
          ctx.moveTo(xR, yTop);
          ctx.lineTo(xR, yBot);
          ctx.stroke();
        }
        ctx.restore();

        // Main outlines
        ctx.save();
        ctx.lineWidth = 1.35;
        ctx.shadowBlur = 11;
        ctx.shadowColor = 'rgba(56, 220, 255, 0.45)';
        ctx.strokeStyle = 'rgba(102, 232, 255, 0.36)';
        ctx.beginPath();
        ctx.moveTo(room.leftX, room.ceilingY);
        ctx.lineTo(vx, vy);
        ctx.lineTo(room.rightX, room.ceilingY);
        ctx.moveTo(room.leftX, room.floorY);
        ctx.lineTo(vx, vy);
        ctx.lineTo(room.rightX, room.floorY);
        ctx.moveTo(room.leftX, room.ceilingY);
        ctx.lineTo(room.leftX, room.floorY);
        ctx.moveTo(room.rightX, room.ceilingY);
        ctx.lineTo(room.rightX, room.floorY);
        ctx.stroke();
        ctx.restore();

        // Floating wall panels
        drawPanel(width * 0.17, height * 0.28, width * 0.12, height * 0.16, -0.10, 190, time);
        drawPanel(width * 0.72, height * 0.24, width * 0.13, height * 0.18, 0.10, 280, time + 900);
      }

      function drawPanel(x, y, w, h, skew, hue, time) {
        const flicker = 0.52 + 0.48 * Math.sin(time * 0.0017);
        ctx.save();
        ctx.translate(x, y);
        ctx.transform(1, 0, skew, 1, 0, 0);
        ctx.fillStyle = `hsla(${hue}, 55%, 12%, 0.28)`;
        ctx.strokeStyle = `hsla(${hue}, 100%, 72%, ${0.18 + flicker * 0.18})`;
        ctx.lineWidth = 1;
        ctx.shadowColor = `hsla(${hue}, 100%, 62%, 0.40)`;
        ctx.shadowBlur = 14;
        roundRectPath(ctx, 0, 0, w, h, 12);
        ctx.fill();
        ctx.stroke();

        ctx.shadowBlur = 0;
        for (let i = 0; i < 4; i++) {
          const yy = h * (0.25 + i * 0.16);
          ctx.strokeStyle = `hsla(${hue + i * 12}, 100%, 74%, ${0.16 + flicker * 0.18})`;
          ctx.beginPath();
          ctx.moveTo(w * 0.16, yy);
          ctx.lineTo(w * (0.58 + Math.sin(time * 0.002 + i) * 0.18), yy);
          ctx.stroke();
        }
        ctx.restore();
      }

      function drawTrail() {
        if (!trailsEnabled || trail.length < 2) return;
        ctx.save();
        ctx.globalCompositeOperation = 'lighter';
        for (let i = trail.length - 1; i >= 0; i--) {
          const t = trail[i];
          const alpha = (1 - i / trail.length) * 0.12 * t.life;
          if (alpha <= 0.002) continue;
          const r = t.r * (0.35 + (1 - i / trail.length) * 0.48);
          const g = ctx.createRadialGradient(t.x, t.y, 0, t.x, t.y, r * 2.4);
          g.addColorStop(0, `hsla(${t.hue}, 100%, 72%, ${alpha * 2.4})`);
          g.addColorStop(0.35, `hsla(${(t.hue + 55) % 360}, 100%, 58%, ${alpha})`);
          g.addColorStop(1, `hsla(${t.hue}, 100%, 50%, 0)`);
          ctx.fillStyle = g;
          ctx.beginPath();
          ctx.arc(t.x, t.y, r * 2.4, 0, Math.PI * 2);
          ctx.fill();
        }
        ctx.restore();
      }

      function drawBall(time) {
        const speed = Math.hypot(ball.vx, ball.vy);
        const stretch = Math.min(0.22, speed / 3600);
        const angle = Math.atan2(ball.vy, ball.vx);
        const squashX = 1 + stretch - ball.squash * 0.55;
        const squashY = 1 - stretch + ball.squash;

        ctx.save();
        ctx.translate(ball.x, ball.y);
        ctx.rotate(angle * 0.18);
        ctx.scale(squashX, squashY);
        ctx.globalCompositeOperation = 'lighter';

        const outer = ctx.createRadialGradient(0, 0, ball.radius * 0.12, 0, 0, ball.radius * 2.3);
        outer.addColorStop(0, `hsla(${ball.hue}, 100%, 76%, 0.42)`);
        outer.addColorStop(0.22, `hsla(${(ball.hue + 52) % 360}, 100%, 66%, 0.26)`);
        outer.addColorStop(0.5, `hsla(${ball.hue}, 100%, 56%, 0.12)`);
        outer.addColorStop(1, `hsla(${ball.hue}, 100%, 50%, 0)`);
        ctx.fillStyle = outer;
        ctx.beginPath();
        ctx.arc(0, 0, ball.radius * 2.3, 0, Math.PI * 2);
        ctx.fill();

        ctx.globalCompositeOperation = 'source-over';
        const grad = ctx.createRadialGradient(-ball.radius * 0.30, -ball.radius * 0.34, ball.radius * 0.05, 0, 0, ball.radius);
        grad.addColorStop(0, 'rgba(255,255,255,0.98)');
        grad.addColorStop(0.09, `hsl(${(ball.hue + 30) % 360}, 100%, 83%)`);
        grad.addColorStop(0.35, `hsl(${ball.hue}, 100%, 61%)`);
        grad.addColorStop(0.73, `hsl(${(ball.hue + 78) % 360}, 94%, 44%)`);
        grad.addColorStop(1, `hsl(${(ball.hue + 130) % 360}, 88%, 18%)`);

        ctx.fillStyle = grad;
        ctx.shadowColor = `hsla(${ball.hue}, 100%, 62%, 0.95)`;
        ctx.shadowBlur = hyperBoost ? 36 : 24;
        ctx.beginPath();
        ctx.arc(0, 0, ball.radius, 0, Math.PI * 2);
        ctx.fill();

        ctx.shadowBlur = 0;
        ctx.rotate(ball.spin);
        ctx.strokeStyle = 'rgba(255,255,255,0.30)';
        ctx.lineWidth = Math.max(1, ball.radius * 0.045);
        ctx.beginPath();
        ctx.arc(0, 0, ball.radius * 0.72, -1.25, 0.9);
        ctx.stroke();
        ctx.strokeStyle = `hsla(${(ball.hue + 120) % 360}, 100%, 78%, 0.42)`;
        ctx.beginPath();
        ctx.arc(0, 0, ball.radius * 0.53, 1.2, 3.5);
        ctx.stroke();

        ctx.restore();

        // Floor reflection / contact glow
        const floorDistance = Math.max(0, room.floorY - ball.y);
        const proximity = Math.max(0, 1 - floorDistance / (height * 0.42));
        const floorBounds = roomBoundsAtY(room.floorY - 2);
        const rx = Math.min(ball.radius * 2.4, (floorBounds.right - floorBounds.left) * 0.12);
        ctx.save();
        ctx.globalCompositeOperation = 'lighter';
        ctx.translate(ball.x, room.floorY + 2);
        ctx.scale(1, 0.22);
        const rg = ctx.createRadialGradient(0, 0, 0, 0, 0, rx);
        rg.addColorStop(0, `hsla(${ball.hue}, 100%, 62%, ${0.20 * proximity})`);
        rg.addColorStop(1, `hsla(${ball.hue}, 100%, 55%, 0)`);
        ctx.fillStyle = rg;
        ctx.beginPath();
        ctx.arc(0, 0, rx, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }

      function drawParticles() {
        ctx.save();
        ctx.globalCompositeOperation = 'lighter';
        for (const p of particles) {
          const alpha = Math.max(0, p.life / p.maxLife);
          ctx.fillStyle = `hsla(${p.hue}, 100%, 70%, ${alpha * 0.85})`;
          ctx.shadowColor = `hsla(${p.hue}, 100%, 60%, ${alpha})`;
          ctx.shadowBlur = 10;
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.size * alpha, 0, Math.PI * 2);
          ctx.fill();
        }
        ctx.restore();
      }

      function drawPointer() {
        if (!pointer.active) return;
        ctx.save();
        ctx.globalCompositeOperation = 'lighter';
        ctx.strokeStyle = 'rgba(119, 237, 255, 0.35)';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.arc(pointer.x, pointer.y, 18, 0, Math.PI * 2);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(pointer.x - 7, pointer.y);
        ctx.lineTo(pointer.x + 7, pointer.y);
        ctx.moveTo(pointer.x, pointer.y - 7);
        ctx.lineTo(pointer.x, pointer.y + 7);
        ctx.stroke();
        ctx.restore();
      }

      function render(time) {
        const sx = shake > 0.05 ? (Math.random() - 0.5) * shake : 0;
        const sy = shake > 0.05 ? (Math.random() - 0.5) * shake : 0;

        ctx.save();
        ctx.translate(sx, sy);
        drawBackground(time);
        drawRoom(time);
        drawTrail();
        drawParticles();
        drawBall(time);
        drawPointer();
        if (flash > 0.002) {
          ctx.fillStyle = `rgba(136, 240, 255, ${flash * 0.07})`;
          ctx.fillRect(0, 0, width, height);
        }
        ctx.restore();
      }

      function frame(time) {
        const dt = Math.min(0.032, Math.max(0.001, (time - lastTime) / 1000));
        lastTime = time;
        update(dt, time);
        render(time);
        requestAnimationFrame(frame);
      }

      function roundRectPath(context, x, y, w, h, r) {
        const radius = Math.min(r, Math.abs(w) / 2, Math.abs(h) / 2);
        context.beginPath();
        context.moveTo(x + radius, y);
        context.arcTo(x + w, y, x + w, y + h, radius);
        context.arcTo(x + w, y + h, x, y + h, radius);
        context.arcTo(x, y + h, x, y, radius);
        context.arcTo(x, y, x + w, y, radius);
        context.closePath();
      }

      function pointerPosition(event) {
        const rect = canvas.getBoundingClientRect();
        const point = event.touches ? event.touches[0] : event;
        return {
          x: point.clientX - rect.left,
          y: point.clientY - rect.top
        };
      }

      canvas.addEventListener('pointermove', (event) => {
        const p = pointerPosition(event);
        pointer.x = p.x;
        pointer.y = p.y;
        pointer.active = true;
      });

      canvas.addEventListener('pointerleave', () => {
        pointer.active = false;
      });

      canvas.addEventListener('pointerdown', (event) => {
        event.preventDefault();
        const p = pointerPosition(event);
        pointer.x = p.x;
        pointer.y = p.y;
        pointer.active = true;
        launchToward(p.x, p.y);
      });

      window.addEventListener('keydown', (event) => {
        if (event.code === 'Space') {
          event.preventDefault();
          paused = !paused;
          pauseBtn.textContent = paused ? 'Resume' : 'Pause';
          pauseBtn.classList.toggle('active', paused);
        } else if (event.key.toLowerCase() === 'r') {
          resetBall(true);
        } else if (event.key.toLowerCase() === 'b') {
          hyperBoost = !hyperBoost;
          boostBtn.classList.toggle('active', hyperBoost);
        }
      });

      pauseBtn.addEventListener('click', () => {
        paused = !paused;
        pauseBtn.textContent = paused ? 'Resume' : 'Pause';
        pauseBtn.classList.toggle('active', paused);
      });

      trailBtn.addEventListener('click', () => {
        trailsEnabled = !trailsEnabled;
        trailBtn.textContent = `Trail: ${trailsEnabled ? 'On' : 'Off'}`;
        trailBtn.classList.toggle('active', trailsEnabled);
      });

      boostBtn.addEventListener('click', () => {
        hyperBoost = !hyperBoost;
        boostBtn.classList.toggle('active', hyperBoost);
        boostBtn.textContent = hyperBoost ? 'Hyper: On' : 'Hyper Boost';
        if (hyperBoost) burst(ball.x, ball.y, 36, ball.hue, 1.5);
      });

      resetBtn.addEventListener('click', () => resetBall(true));
      window.addEventListener('resize', resize);

      resize();
      requestAnimationFrame(frame);
    })();
  </script>
</body>
</html>
